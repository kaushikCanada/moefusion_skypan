# -- Potsdam: SegFormer + Panopticon (parallel decoder input) ------------------

dataset:
  name: "potsdam"
  root: "/data/ISPRS/data/potsdam/Potsdam"
  patch_size: 512
  patch_stride: 512
  nodata_threshold: 1.0
  max_sampler_checks: 0
  num_workers: 8
  batch_size: 8
  ignore_index: 0

  normalization:
    ms:
      mean: [87.141, 93.508, 85.990, 107.422]
      std: [34.971, 35.606, 37.119, 36.602]
    ndsm:
      mean: 0.159
      std: 0.830

  ndsm_opening_kernel: 17

  split:
    val_fraction: 0.3
    seed: 42

  bands:
    names: [R, G, B, IR]
    wavelengths_nm: [650.0, 560.0, 450.0, 840.0]
    rgb_indices: [0, 1, 2]

  class_names:
    - "Impervious surfaces"
    - "Building"
    - "Low vegetation"
    - "Tree"
    - "Car"

model:
  arch: "segformer_panopticon"
  num_classes: 6
  in_channels: 5  # RGBIR + nDSM
  segformer_pretrained: "/workspace/ckpt/segformer/b2"
  segformer_variant: "b2"
  use_pretrained_weights: false
  use_panopticon: false
  panopticon_checkpoint: "/workspace/ckpt/panopticon_vitb14_teacher.pth"

training:
  max_epochs: 30
  lr: 6.0e-5
  weight_decay: 0.01
  scheduler: "cosine"
  warmup_epochs: 2
  val_interval: 5
  log_interval: 300

  loss:
    ce_weight: 1.0
    lovasz_weight: 1.0
    label_smoothing: 0.1