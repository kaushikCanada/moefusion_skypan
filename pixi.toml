[workspace]
name = "roy_moefusion"
version = "0.1.0"
description = "Multi-backbone MoE fusion for land cover segmentation"
authors = ["Antigravity"]
channels = ["pytorch", "nvidia", "conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = "3.11.*"
pytorch = {version = "2.3.0.*", channel = "pytorch"}
torchvision = {version = "0.18.0.*", channel = "pytorch"}
pytorch-cuda = {version = "12.1.*", channel = "pytorch"}
numpy = ">=1.24"
scipy = ">=1.10"
matplotlib = ">=3.7"
gdal = ">=3.6"
pip = ">=23"

[pypi-dependencies]
# ── OpenMMLab stack (v2.x) ──────────────────────────────────────────────────
# mmengine is the new base; mmcv 2.x depends on it.
mmengine = ">=0.10.0,<1.0.0"
# mmcv is installed separately in Dockerfile via pip (needs OpenMMLab index for prebuilt wheels)
# mmpretrain (successor to mmcls) — has SwinTransformerV2, ViT, etc.
mmpretrain = ">=1.2.0,<2.0.0"
# mmseg v2.x — has UPerNet head, segmentation pipeline
mmsegmentation = ">=1.2.0,<2.0.0"

# ── Remote sensing FMs ──────────────────────────────────────────────────────
torchgeo = ">=0.8,<0.9"

# ── Utilities ───────────────────────────────────────────────────────────────
kornia = ">=0.8.2"
rasterio = ">=1.4.3"
einops = ">=0.7"
timm = ">=1.0"
